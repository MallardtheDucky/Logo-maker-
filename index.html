<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tales of the New Era - Logo Forge</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Oswald:wght@500;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --sw-yellow: #FFE81F;
            --sw-yellow-glow: rgba(255, 232, 31, 0.6);
            --nr-blue: #0ea5e9;
            --nr-dark: #0f172a;
            --gi-red: #dc2626;
            --gi-dark: #270404;
            --panel-bg: rgba(10, 15, 25, 0.75);
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        body {
            background-color: #030305;
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(14, 165, 233, 0.1) 0%, transparent 40%),
                radial-gradient(circle at 90% 80%, rgba(220, 38, 38, 0.1) 0%, transparent 40%),
                url("data:image/svg+xml,%3Csvg width='120' height='120' viewBox='0 0 120 120' xmlns='http://www.w3.org/2000/svg'%3E%3Ccircle cx='60' cy='60' r='1' fill='rgba(255,255,255,0.08)'/%3E%3Ccircle cx='20' cy='100' r='0.5' fill='rgba(255,255,255,0.05)'/%3E%3Ccircle cx='100' cy='30' r='1.5' fill='rgba(14,165,233,0.1)'/%3E%3C/svg%3E");
            color: #e2e8f0;
            font-family: 'Barlow Condensed', sans-serif;
            overflow-x: hidden;
        }

        /* --- UI Panels & Elements --- */
        .tech-panel {
            background: var(--panel-bg);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--glass-border);
            box-shadow: 0 30px 60px -15px rgba(0, 0, 0, 0.9), inset 0 0 30px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }
        
        .panel-nr { border-top: 2px solid var(--nr-blue); }
        .panel-nr::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(180deg, rgba(14,165,233,0.05) 0%, transparent 100%); pointer-events: none; }
        
        .panel-gi { border-top: 2px solid var(--gi-red); }
        .panel-gi::before { content:''; position:absolute; top:0; left:0; width:100%; height:100%; background: linear-gradient(180deg, rgba(220,38,38,0.05) 0%, transparent 100%); pointer-events: none; }

        input[type="file"] { display: none; }
        .file-btn {
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase; letter-spacing: 2px;
            font-weight: 600; font-size: 0.8rem;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(255,255,255,0.1);
            position: relative; padding: 0.75rem 1rem; border-radius: 0.5rem;
            box-shadow: inset 0 0 0 1px rgba(255,255,255,0.05);
        }
        .file-btn:hover { background: rgba(255,255,255,0.1); transform: translateY(-2px); }
        .file-btn.nr:hover { border-color: var(--nr-blue); box-shadow: 0 5px 20px rgba(14, 165, 233, 0.3), inset 0 0 0 1px var(--nr-blue); }
        .file-btn.gi:hover { border-color: var(--gi-red); box-shadow: 0 5px 20px rgba(220, 38, 38, 0.3), inset 0 0 0 1px var(--gi-red); }

        .slider-group { background: rgba(0,0,0,0.4); padding: 0.75rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.03); }
        .tech-range { -webkit-appearance: none; width: 100%; height: 4px; background: rgba(255,255,255,0.1); outline: none; border-radius: 2px; margin-top: 0.5rem; }
        .tech-range::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #fff; cursor: pointer; border-radius: 50%; transition: 0.2s; }
        .tech-range.nr::-webkit-slider-thumb { box-shadow: 0 0 12px var(--nr-blue); border: 3px solid var(--nr-blue); }
        .tech-range.gi::-webkit-slider-thumb { box-shadow: 0 0 12px var(--gi-red); border: 3px solid var(--gi-red); }
        .tech-range::-webkit-slider-thumb:hover { transform: scale(1.4); background: var(--sw-yellow); border-color: #fff;}

        /* --- Canvas Setup --- */
        .clip-nr { clip-path: polygon(0 0, 100% 0, 0 100%); }
        .clip-gi { clip-path: polygon(100% 100%, 0 100%, 100% 0); }

        /* Faction Textures */
        .pattern-grid {
            background-image: 
                linear-gradient(rgba(14, 165, 233, 0.15) 1px, transparent 1px),
                linear-gradient(90deg, rgba(14, 165, 233, 0.15) 1px, transparent 1px);
            background-size: 30px 30px;
        }
        .pattern-hex {
            background-color: transparent;
            background-image: url("data:image/svg+xml,%3Csvg width='40' height='69.282' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M40 17.32l-20 11.547L0 17.32V-5.774l20-11.547L40-5.774V17.32zm0 46.188l-20 11.548-20-11.548V40.414L20 28.867l20 11.547v23.094z' fill='none' stroke='rgba(220, 38, 38, 0.15)' stroke-width='1'/%3E%3C/svg%3E");
        }

        /* --- Typography & Centerpiece --- */
        .sw-title-classic {
            font-family: 'Oswald', sans-serif;
            font-size: 4.5rem;
            color: transparent; 
            -webkit-text-stroke: 2.5px var(--sw-yellow);
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1;
            transform: scaleY(1.2); 
            text-shadow: 
                -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000,
                0px 4px 0px rgba(255, 232, 31, 0.7),
                0px 8px 15px rgba(0, 0, 0, 0.8),
                0 0 40px rgba(255,232,31,0.25);
            position: relative;
            z-index: 30;
            animation: starwars-pulse 3s ease-in-out infinite;
        }

        @keyframes starwars-pulse {
            0%, 100% { text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0px 4px 0px rgba(255, 232, 31, 0.7), 0px 8px 15px rgba(0, 0, 0, 0.8), 0 0 40px rgba(255,232,31,0.25); }
            50% { text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0px 4px 0px rgba(255, 232, 31, 0.9), 0px 8px 15px rgba(0, 0, 0, 0.8), 0 0 70px rgba(255,232,31,0.5), 0 0 120px rgba(255,232,31,0.2); }
        }

        /* IMPROVED: Tales of the - now fully visible with metallic gradient */
        .tales-subtitle {
            font-family: 'Cinzel', serif;
            font-size: 0.9rem;
            font-weight: 700;
            letter-spacing: 0.55em;
            text-transform: uppercase;
            position: relative;
            z-index: 30;
            line-height: 1;
            /* Metallic gold gradient matching Star Wars aesthetic */
            background: linear-gradient(180deg, #fff7cc 0%, #ffe81f 30%, #d4a017 60%, #ffe81f 80%, #fff5a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 2px 6px rgba(0,0,0,1)) drop-shadow(0 0 14px rgba(255,232,31,0.7));
        }

        .era-title {
            font-family: 'Cinzel', serif;
            letter-spacing: 0.15em;
            position: relative;
            z-index: 30;
        }
        
        .era-gradient {
            background: linear-gradient(180deg, #ffffff 0%, #d4d4d4 30%, #f0f0f0 50%, #c8c8c8 70%, #ffffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 4px 12px rgba(0,0,0,1)) drop-shadow(0 0 20px rgba(255,255,255,0.35));
        }

        /* Decorative divider lines flanking "TALES OF THE" */
        .tales-divider {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            z-index: 30;
        }
        .tales-divider-line {
            height: 1px;
            width: 40px;
            background: linear-gradient(90deg, transparent, rgba(255,232,31,0.8), transparent);
        }
        .tales-divider-diamond {
            width: 4px; height: 4px;
            background: var(--sw-yellow);
            transform: rotate(45deg);
            box-shadow: 0 0 8px var(--sw-yellow);
        }

        /* Decorative horizontal rule above STAR WARS */
        .logo-rule {
            width: 80%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,232,31,0.4) 20%, rgba(255,255,255,0.6) 50%, rgba(220,38,38,0.4) 80%, transparent);
            position: relative; z-index: 30;
            box-shadow: 0 0 8px rgba(255,255,255,0.3);
        }
        .logo-rule-bottom {
            width: 60%; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(14,165,233,0.5) 20%, rgba(255,255,255,0.7) 50%, rgba(220,38,38,0.5) 80%, transparent);
            position: relative; z-index: 30;
        }

        /* HUD Corner Brackets */
        .hud-corner {
            position: absolute; width: 28px; height: 28px; z-index: 50; pointer-events: none;
        }
        .hud-corner-tl { top: 10px; left: 10px; border-top: 2px solid rgba(14,165,233,0.8); border-left: 2px solid rgba(14,165,233,0.8); }
        .hud-corner-tr { top: 10px; right: 10px; border-top: 2px solid rgba(220,38,38,0.8); border-right: 2px solid rgba(220,38,38,0.8); }
        .hud-corner-bl { bottom: 10px; left: 10px; border-bottom: 2px solid rgba(14,165,233,0.8); border-left: 2px solid rgba(14,165,233,0.8); }
        .hud-corner-br { bottom: 10px; right: 10px; border-bottom: 2px solid rgba(220,38,38,0.8); border-right: 2px solid rgba(220,38,38,0.8); }

        /* HUD Tick marks on edges */
        .hud-tick-top { position: absolute; top: 10px; left: 50%; transform: translateX(-50%); width: 1px; height: 14px; background: rgba(255,255,255,0.25); z-index: 50; }
        .hud-tick-bottom { position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%); width: 1px; height: 14px; background: rgba(255,255,255,0.25); z-index: 50; }
        .hud-tick-left { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); height: 1px; width: 14px; background: rgba(255,255,255,0.25); z-index: 50; }
        .hud-tick-right { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); height: 1px; width: 14px; background: rgba(255,255,255,0.25); z-index: 50; }

        /* Era badge / datestamp */
        .era-badge {
            position: absolute; bottom: 26px; left: 50%; transform: translateX(-50%);
            z-index: 50; pointer-events: none;
            font-family: 'Barlow Condensed', sans-serif;
            font-size: 0.55rem; letter-spacing: 0.4em;
            color: rgba(255,255,255,0.35); text-transform: uppercase;
            white-space: nowrap;
        }

        /* The Intense Diagonal Clash Line */
        .clash-beam-container {
            position: absolute; top: 50%; left: 50%; width: 150%; height: 20px;
            transform: translate(-50%, -50%) rotate(-45deg);
            z-index: 20; pointer-events: none;
            display: flex; align-items: center; justify-content: center;
        }
        
        .clash-beam-core {
            width: 100%; height: 3px; background: #ffffff;
            box-shadow: 0 0 10px #fff, 0 0 20px #fff;
            position: absolute;
            animation: beam-flicker 2s ease-in-out infinite;
        }

        @keyframes beam-flicker {
            0%, 100% { opacity: 1; box-shadow: 0 0 10px #fff, 0 0 20px #fff; }
            50% { opacity: 0.85; box-shadow: 0 0 15px #fff, 0 0 35px #fff, 0 0 55px rgba(255,232,31,0.3); }
        }

        .clash-beam-nr-glow {
            width: 100%; height: 10px; position: absolute; top: -5px;
            background: linear-gradient(90deg, transparent, var(--nr-blue), transparent);
            filter: blur(8px); opacity: 0.8;
            animation: glow-pulse-nr 2.5s ease-in-out infinite;
        }

        .clash-beam-gi-glow {
            width: 100%; height: 10px; position: absolute; bottom: -5px;
            background: linear-gradient(90deg, transparent, var(--gi-red), transparent);
            filter: blur(8px); opacity: 0.8;
            animation: glow-pulse-gi 2.5s ease-in-out infinite;
        }

        @keyframes glow-pulse-nr { 0%,100%{opacity:0.7;} 50%{opacity:1;filter:blur(10px);} }
        @keyframes glow-pulse-gi { 0%,100%{opacity:0.7;} 50%{opacity:1;filter:blur(10px);} }

        /* Lightning effect overlaid on the clash */
        .clash-lightning {
            position: absolute; width: 100%; height: 40px;
            background-image: url("data:image/svg+xml,%3Csvg preserveAspectRatio='none' viewBox='0 0 1000 40' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 20 Q 50 0, 100 20 T 200 20 T 300 10 T 400 30 T 500 20 T 600 5 T 700 35 T 800 20 T 900 15 T 1000 20' fill='none' stroke='rgba(255,255,255,0.8)' stroke-width='1.5' filter='drop-shadow(0 0 4px rgba(255,255,255,0.8))'/%3E%3Cpath d='M0 20 Q 80 40, 150 20 T 250 5 T 350 20 T 450 35 T 550 20 T 650 10 T 750 25 T 850 5 T 1000 20' fill='none' stroke='rgba(200,230,255,0.6)' stroke-width='1' filter='drop-shadow(0 0 3px rgba(14,165,233,1))'/%3E%3C/svg%3E");
            background-size: 100% 100%;
            opacity: 0.9;
        }

        /* Central Clash Flare */
        .clash-flare {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 350px; height: 350px;
            background: radial-gradient(circle, rgba(255,255,255,1) 0%, rgba(255,232,31,0.8) 15%, rgba(220,38,38,0.4) 30%, rgba(14,165,233,0.2) 50%, transparent 70%);
            filter: blur(4px); pointer-events: none; z-index: 25; mix-blend-mode: screen;
            animation: flare-breathe 3s ease-in-out infinite;
        }

        @keyframes flare-breathe {
            0%,100% { transform: translate(-50%,-50%) scale(1); opacity: 1; }
            50% { transform: translate(-50%,-50%) scale(1.12); opacity: 0.85; }
        }

        /* Animated energy rings from the clash center */
        .energy-ring {
            position: absolute; top: 50%; left: 50%;
            border-radius: 50%;
            border: 1px solid rgba(255,232,31,0.5);
            transform: translate(-50%,-50%) scale(0);
            pointer-events: none; z-index: 22;
            animation: ring-expand 4s ease-out infinite;
        }
        .energy-ring:nth-child(2) { animation-delay: 1.3s; border-color: rgba(14,165,233,0.4); }
        .energy-ring:nth-child(3) { animation-delay: 2.6s; border-color: rgba(220,38,38,0.4); }

        @keyframes ring-expand {
            0% { width: 30px; height: 30px; transform: translate(-50%,-50%) scale(1); opacity: 0.9; }
            100% { width: 400px; height: 400px; transform: translate(-50%,-50%) scale(1); opacity: 0; }
        }

        .clash-sparks {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 100%; height: 100%;
            background-image: 
                radial-gradient(circle at 45% 45%, #fff 1px, transparent 2px),
                radial-gradient(circle at 55% 55%, #fff 1px, transparent 2px),
                radial-gradient(circle at 48% 52%, var(--sw-yellow) 1.5px, transparent 3px),
                radial-gradient(circle at 52% 48%, #fff 1px, transparent 2px);
            background-size: 100px 100px; opacity: 0.6; z-index: 24; pointer-events: none;
        }

        .cinematic-glow {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 180%; height: 70%;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0.6) 30%, transparent 75%);
            pointer-events: none; z-index: 15;
        }

        /* Animated scanlines */
        .scanlines {
            position: absolute; inset: 0; z-index: 40; pointer-events: none; opacity: 0.12;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, #000 2px, #000 4px);
        }
        
        .vignette {
            position: absolute; inset: 0; z-index: 45; pointer-events: none;
            background: radial-gradient(circle at center, transparent 40%, rgba(0,0,0,0.85) 120%);
        }

        /* Animated star field */
        .starfield {
            position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden;
        }
        .star-dot {
            position: absolute; border-radius: 50%; background: white;
            animation: star-twinkle var(--dur, 3s) ease-in-out infinite;
            animation-delay: var(--del, 0s);
        }
        @keyframes star-twinkle {
            0%,100% { opacity: var(--min-op, 0.2); transform: scale(1); }
            50% { opacity: var(--max-op, 0.8); transform: scale(1.5); }
        }

        /* Subtle animated NR side aurora */
        .nr-aurora {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 20% 30%, rgba(14,165,233,0.18) 0%, transparent 55%);
            animation: aurora-nr 5s ease-in-out infinite alternate;
            pointer-events: none; z-index: 2;
        }
        @keyframes aurora-nr { 0%{opacity:0.6;} 100%{opacity:1;} }

        /* Subtle animated GI side aurora */
        .gi-aurora {
            position: absolute; inset: 0;
            background: radial-gradient(ellipse at 80% 70%, rgba(220,38,38,0.18) 0%, transparent 55%);
            animation: aurora-gi 5s ease-in-out infinite alternate-reverse;
            pointer-events: none; z-index: 2;
        }
        @keyframes aurora-gi { 0%{opacity:0.6;} 100%{opacity:1;} }

        .holonet-frame {
            background: rgba(5,5,10,0.9); padding: 12px; border-radius: 20px;
            box-shadow: 0 25px 50px rgba(0,0,0,1), 0 0 0 1px rgba(255,255,255,0.05), inset 0 0 20px rgba(0,0,0,0.8);
            position: relative;
        }

        /* Custom Toast Notification */
        #toast-container {
            position: fixed; bottom: 20px; right: 20px; z-index: 100;
            display: flex; flex-direction: column; gap: 10px;
        }
        .toast {
            background: rgba(15, 20, 30, 0.95); border-left: 4px solid var(--gi-red);
            color: white; padding: 16px 24px; border-radius: 4px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase; letter-spacing: 1px;
            transform: translateX(120%); transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .toast.show { transform: translateX(0); }
        .toast.success { border-left-color: #10b981; }

        @media (max-width: 768px) {
            .sw-title-classic { font-size: 3rem; -webkit-text-stroke: 1.5px var(--sw-yellow); }
            .era-title { font-size: 1.5rem; }
            .tales-subtitle { font-size: 0.7rem; letter-spacing: 0.4em; }
            .clash-flare { width: 200px; height: 200px; }
            .holonet-frame { padding: 8px; }
        }
    </style>
</head>
<body class="min-h-screen p-4 md:p-8 flex flex-col items-center">

    <header class="text-center mb-8 w-full max-w-7xl mt-2 relative z-10">
        <h1 class="text-4xl md:text-6xl font-black mb-1 tracking-widest text-white drop-shadow-[0_0_20px_rgba(255,255,255,0.4)]" style="font-family: 'Cinzel', serif;">
            LOGO FORGE
        </h1>
        <div class="h-[3px] w-72 bg-gradient-to-r from-sky-500 via-white to-red-600 mx-auto mt-4 mb-4 shadow-[0_0_20px_rgba(255,255,255,0.6)] rounded-full"></div>
        <p class="text-gray-400 text-sm md:text-lg tracking-[0.5em] uppercase font-bold text-shadow-sm">Construct the Ultimate Faction Divide</p>
    </header>

    <main class="w-full max-w-7xl grid grid-cols-1 lg:grid-cols-12 gap-8 lg:gap-10 items-start relative z-10">
        
        <!-- Controls (7 cols) -->
        <div class="lg:col-span-7 space-y-6">
            
            <!-- New Republic Controls -->
            <div class="tech-panel panel-nr p-6 rounded-2xl relative">
                <div class="flex items-center gap-3 mb-5 border-b border-gray-700/50 pb-4 relative z-10">
                    <div class="w-4 h-4 rounded-full bg-sky-500 shadow-[0_0_20px_#0ea5e9] animate-pulse"></div>
                    <h2 class="text-2xl md:text-3xl font-bold text-sky-400 uppercase tracking-[0.15em] text-shadow-sm">New Republic <span class="text-sm text-gray-500 tracking-widest ml-2">(Top-Left)</span></h2>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-5 relative z-10">
                    <label class="file-btn nr">
                        <input type="file" id="nr-bg-input" accept="image/*">
                        <span class="flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg> Set Backdrop</span>
                    </label>
                    <label class="file-btn nr">
                        <input type="file" id="nr-logo-input" accept="image/*">
                        <span class="flex items-center gap-2"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.956 11.956 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"></path></svg> Set Insignia</span>
                    </label>
                </div>

                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 relative z-10">
                    <div class="slider-group">
                        <label class="text-xs text-gray-400 uppercase flex justify-between tracking-wider font-bold mb-1"><span>Scale</span> <span id="nr-scale-val" class="text-sky-400">55%</span></label>
                        <input type="range" id="nr-scale" min="20" max="150" value="55" class="tech-range nr">
                    </div>
                    <div class="slider-group">
                        <label class="text-xs text-gray-400 uppercase flex justify-between tracking-wider font-bold mb-1"><span>Pos X</span> <span id="nr-x-val" class="text-sky-400">-15%</span></label>
                        <input type="range" id="nr-x" min="-50" max="50" value="-15" class="tech-range nr">
                    </div>
                    <div class="slider-group">
                        <label class="text-xs text-gray-400 uppercase flex justify-between tracking-wider font-bold mb-1"><span>Pos Y</span> <span id="nr-y-val" class="text-sky-400">-15%</span></label>

                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>

        <!-- Live Preview Canvas (5 cols) -->

                        <div class="absolute inset-0 pattern-hex opacity-60"></div>
                        <div class="absolute inset-0 opacity-50 mix-blend-screen" style="background-image: radial-gradient(white, rgba(255,255,255,.3) 2px, transparent 40px); background-size: 550px 550px; background-position: 40px 60px;"></div>

                    <!-- LOGO CONTAINERS -->

                    <div class="absolute inset-0 clip-nr z-10 pointer-events-none overflow-hidden">
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-full h-full flex items-center justify-center">

                                        <path d="M50 10 C60 30, 85 45, 90 70 C92 80, 85 90, 75 90 C65 90, 55 75, 50 65 C45 75, 35 90, 25 90 C15 90, 8 80, 10 70 C15 45, 40 30, 50 10 Z M50 35 L40 60 L50 75 L60 60 Z"/>

                    <!-- GI Logo Half -->
                    <div class="absolute inset-0 clip-gi z-10 pointer-events-none overflow-hidden">

                                        <path fill-rule="evenodd" clip-rule="evenodd" d="M50 5 C74.8 5, 95 25.2, 95 50 C95 74.8, 74.8 95, 50 95 C25.2 95, 5 74.8, 5 50 C5 25.2, 25.2 5, 50 5 Z M50 15 C30.6 15, 15 30.6, 15 50 C15 69.4, 30.6 85, 50 85 C69.4 85, 85 69.4, 85 50 C85 30.6, 69.4 15, 50 15 Z M50 35 L55 20 L45 20 Z M50 65 L45 80 L55 80 Z M35 50 L20 45 L20 55 Z M65 50 L80 55 L80 45 Z M60.6 60.6 L71.2 71.2 L64.1 78.3 L53.5 67.7 Z M39.4 39.4 L28.8 28.8 L35.9 21.7 L46.5 32.3 Z M60.6 39.4 L71.2 28.8 L78.3 35.9 L67.7 46.5 Z M39.4 60.6 L28.8 71.2 L21.7 64.1 L32.3 53.5 Z M50 58 C54.4 58, 58 54.4, 58 50 C58 45.6, 54.4 42, 50 42 C45.6 42, 42 45.6, 42 50 C42 54.4, 45.6 58, 50 58 Z"/>

                <p class="text-sm text-sky-400 font-mono mt-1">✓ HIGH RESOLUTION RENDER READY</p>

    </main>

    <!-- Notification Toast Container -->
    <div id="toast-container"></div>

    <script>
        // Generate animated starfield
        (function() {
            const sf = document.getElementById('starfield');
            const starData = [
                {x:8,y:12,s:1.2,dur:2.8,del:0,minO:0.3,maxO:0.9},
                {x:18,y:5,s:0.8,dur:3.5,del:0.6,minO:0.2,maxO:0.7},
                {x:30,y:20,s:1,dur:2.2,del:1.1,minO:0.15,maxO:0.6},
                {x:5,y:40,s:1.5,dur:4,del:0.3,minO:0.2,maxO:0.8},
                {x:22,y:60,s:0.6,dur:3.1,del:1.8,minO:0.1,maxO:0.5},
                {x:12,y:78,s:1.1,dur:2.6,del:0.9,minO:0.25,maxO:0.75},
                {x:35,y:88,s:0.9,dur:3.8,del:0.4,minO:0.2,maxO:0.65},
                {x:75,y:10,s:1.3,dur:2.9,del:1.5,minO:0.3,maxO:0.9},
                {x:85,y:25,s:0.7,dur:3.3,del:0.2,minO:0.15,maxO:0.6},
                {x:92,y:45,s:1,dur:2.5,del:1.2,minO:0.2,maxO:0.7},
                {x:80,y:65,s:1.4,dur:4.1,del:0.7,minO:0.25,maxO:0.85},
                {x:70,y:80,s:0.8,dur:3.6,del:0.1,minO:0.1,maxO:0.55},
                {x:88,y:90,s:1.1,dur:2.7,del:2,minO:0.2,maxO:0.7},
                {x:60,y:8,s:0.9,dur:3.2,del:1.4,minO:0.15,maxO:0.5},
                {x:45,y:92,s:1.2,dur:2.4,del:0.8,minO:0.3,maxO:0.8},
            ];
            starData.forEach(d => {
                const el = document.createElement('div');
                el.className = 'star-dot';
                el.style.cssText = `left:${d.x}%;top:${d.y}%;width:${d.s}px;height:${d.s}px;--dur:${d.dur}s;--del:${d.del}s;--min-op:${d.minO};--max-op:${d.maxO};`;
                sf.appendChild(el);
            });
        })();

        // Custom Toast Notification System
        function showToast(message, type = 'error') {
            const container = document.getElementById('toast-container');
            const toast = document.createElement('div');
            toast.className = `toast ${type === 'success' ? 'success' : ''}`;
            
            let icon = type === 'success' 
                ? '<svg class="w-5 h-5 inline-block mr-2 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>'
                : '<svg class="w-5 h-5 inline-block mr-2 text-red-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>';
            
            toast.innerHTML = `${icon} <span class="align-middle">${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => toast.classList.add('show'), 10);
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 400);
            }, 5000);
        }

        // File Upload Handlers
        function handleImageUpload(inputId, imgPreviewId, defaultSvgId) {
            const input = document.getElementById(inputId);
            const preview = document.getElementById(imgPreviewId);
            const defaultSvg = document.getElementById(defaultSvgId);
            const labelSpan = input.nextElementSibling;

            input.addEventListener('change', function(event) {
                const file = event.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        preview.src = e.target.result;
                        preview.classList.remove('hidden');
                        if (defaultSvg) defaultSvg.classList.add('hidden');
                        labelSpan.innerHTML = '<svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg> Change Image';
                    }
                    reader.readAsDataURL(file);
                }
            });
        }

        handleImageUpload('nr-bg-input', 'nr-bg-preview', null);
        handleImageUpload('gi-bg-input', 'gi-bg-preview', null);
        handleImageUpload('nr-logo-input', 'nr-logo-preview', 'nr-logo-default');
        handleImageUpload('gi-logo-input', 'gi-logo-preview', 'gi-logo-default');

        // Layout Sliders (Scale, X, Y)
        const layoutConfig = {
            nr: { scale: 55, x: -15, y: -15 },
            gi: { scale: 55, x: 15, y: 15 }
        };

        function updateLayout(faction) {
            const scaleWrapper = document.getElementById(`${faction}-scale-wrapper`);
            const posWrapper = document.getElementById(`${faction}-pos-wrapper`);
            
            scaleWrapper.style.width = `${layoutConfig[faction].scale}%`;
            scaleWrapper.style.height = `${layoutConfig[faction].scale}%`;
            posWrapper.style.transform = `translate(${layoutConfig[faction].x}%, ${layoutConfig[faction].y}%)`;
        }

        function attachSlider(sliderId, faction, property, suffix = '%') {
            const slider = document.getElementById(sliderId);
            const valueDisplay = document.getElementById(`${sliderId}-val`);

            slider.addEventListener('input', function(e) {
                const val = e.target.value;
                layoutConfig[faction][property] = parseInt(val);
                valueDisplay.innerText = val + suffix;
                updateLayout(faction);
            });
        }
        
        attachSlider('nr-scale', 'nr', 'scale');
        attachSlider('nr-x', 'nr', 'x');
        attachSlider('nr-y', 'nr', 'y');

        attachSlider('gi-scale', 'gi', 'scale');
        attachSlider('gi-x', 'gi', 'x');
        attachSlider('gi-y', 'gi', 'y');

        // Discord Circle Preview Toggle
        const toggleInput = document.getElementById('discord-preview-toggle');
        const captureArea = document.getElementById('capture-area');
        const dot = document.querySelector('.dot');

        toggleInput.addEventListener('change', function() {
            if (this.checked) {
                captureArea.classList.replace('rounded-xl', 'rounded-full');
                dot.classList.add('translate-x-8');
                dot.classList.replace('bg-gray-400', 'bg-white');
            } else {
                captureArea.classList.replace('rounded-full', 'rounded-xl');
                dot.classList.remove('translate-x-8');
                dot.classList.replace('bg-white', 'bg-gray-400');
            }
        });

        // High Res Export Functionality
        document.getElementById('download-btn').addEventListener('click', function() {
            const logoElement = document.getElementById('capture-area');
            const btn = this;
            const originalText = btn.innerHTML;
            
            btn.innerHTML = '<svg class="animate-spin w-6 h-6 text-black" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg> Forging Matrix...';
            btn.disabled = true;
            btn.classList.add('opacity-70', 'cursor-not-allowed');

            logoElement.offsetHeight;

            html2canvas(logoElement, {
                scale: 3,
                useCORS: true,
                backgroundColor: null,
                logging: false,
                allowTaint: true
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = 'TalesOfTheNewEra_Logo.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
                
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
                
                showToast("Matrix successfully extracted to standard datapad.", "success");
            }).catch(err => {
                console.error("Error generating logo:", err);
                showToast("Transmission failed. Ensure uploaded images are standard formats.");
                
                btn.innerHTML = originalText;
                btn.disabled = false;
                btn.classList.remove('opacity-70', 'cursor-not-allowed');
            });
        });
    </script>
